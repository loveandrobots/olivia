<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#302B6A"/>

  <!-- Orbit arc top-right (bright) -->
  <path d="M256 80 A176 176 0 0 1 432 256"
        fill="none" stroke="#A89EFF" stroke-width="20"
        stroke-linecap="round" opacity="0.6"/>

  <!-- Orbit arc bottom-left (dim) -->
  <path d="M256 432 A176 176 0 0 1 80 256"
        fill="none" stroke="#A89EFF" stroke-width="20"
