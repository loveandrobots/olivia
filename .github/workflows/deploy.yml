name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    name: Typecheck and Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all packages
        run: npm run typecheck

      - name: Run domain unit tests
        run: npm run test:domain

      - name: Run API unit tests
        run: npm run test:api

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image names
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "API_IMAGE=ghcr.io/${OWNER}/olivia-api" >> $GITHUB_ENV
          echo "PWA_IMAGE=ghcr.io/${OWNER}/olivia-pwa" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push PWA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/pwa/Dockerfile
          push: true
          tags: |
            ${{ env.PWA_IMAGE }}:latest
            ${{ env.PWA_IMAGE }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=pwa
          cache-to: type=gha,mode=max,scope=pwa

  deploy:
    name: Deploy to EC2 via Tailscale
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # Connect the GitHub Actions runner to your Tailscale network so it can
      # reach the EC2 instance. Uses an OAuth client (not a reusable auth key)
      # so credentials don't expire.
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Set up SSH key
        run: |
          install -m 600 /dev/null /tmp/ec2_key
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/ec2_key

      - name: Copy docker-compose.yml to server
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          scp -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            docker-compose.yml ubuntu@${EC2_HOST}:~/olivia/docker-compose.yml

      - name: Deploy
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          OWNER_LC=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          ssh -i /tmp/ec2_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            ubuntu@${EC2_HOST} \
            "
              set -e
              cd ~/olivia

              # Log in to GHCR using the token stored in .env on the server.
              source .env
              echo \${GHCR_TOKEN} | docker login ghcr.io -u ${GITHUB_REPOSITORY_OWNER} --password-stdin

              # Pull SHA-tagged images so the deploy is reproducible.
              docker pull ghcr.io/${OWNER_LC}/olivia-api:${IMAGE_TAG}
              docker pull ghcr.io/${OWNER_LC}/olivia-pwa:${IMAGE_TAG}

              # Re-tag as latest so docker-compose.yml :latest reference picks them up.
              docker tag ghcr.io/${OWNER_LC}/olivia-api:${IMAGE_TAG} ghcr.io/${OWNER_LC}/olivia-api:latest
              docker tag ghcr.io/${OWNER_LC}/olivia-pwa:${IMAGE_TAG} ghcr.io/${OWNER_LC}/olivia-pwa:latest

              docker compose up -d --no-build --remove-orphans

              # Clean up dangling images to save disk space.
              docker image prune -f
            "

      - name: Clean up SSH key
        if: always()
        run: rm -f /tmp/ec2_key
