name: CI

on:
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Typecheck and Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck all packages
        run: npm run typecheck

      - name: Run domain unit tests
        run: npm run test:domain

      - name: Run API unit tests
        run: npm run test:api

  docker-smoke-test:
    name: Docker Build and Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false
          load: true
          tags: olivia-api:ci
          cache-from: type=gha,scope=api-ci
          cache-to: type=gha,mode=max,scope=api-ci

      - name: Build PWA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/pwa/Dockerfile
          push: false
          load: true
          tags: olivia-pwa:ci
          build-args: |
            VITE_API_BASE_URL=/api
          cache-from: type=gha,scope=pwa-ci
          cache-to: type=gha,mode=max,scope=pwa-ci

      - name: Start API container and verify it serves /api/health
        run: |
          docker run -d --name api-smoke \
            -p 3001:3001 \
            -e OLIVIA_DB_PATH=/tmp/olivia.sqlite \
            -e OLIVIA_PWA_ORIGIN=http://localhost \
            olivia-api:ci

          # Wait up to 30 s for the health endpoint to respond 200.
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001/api/health; then
              echo "API is healthy"
              docker rm -f api-smoke
              exit 0
            fi
            echo "Waiting for API... attempt $i"
            sleep 2
          done

          echo "API failed to become healthy"
          docker logs api-smoke
          docker rm -f api-smoke
          exit 1
