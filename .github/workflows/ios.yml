name: iOS Build & TestFlight

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
    paths:
      - "apps/pwa/**"
      - "packages/**"
      - "package-lock.json"
  push:
    branches: [main]

jobs:
  build-ios:
    name: Build iOS App
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build -w @olivia/contracts && npm run build -w @olivia/domain && npm run build -w @olivia/pwa

      - name: Sync Capacitor iOS
        working-directory: apps/pwa
        run: npx cap sync ios

      - name: Build iOS project (PR validation)
        if: github.event_name == 'pull_request'
        working-directory: apps/pwa/ios/App
        run: |
          xcodebuild build \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | tail -20

      # TestFlight upload on push to main
      - name: Install Apple certificate and provisioning profile
        id: signing
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

          # Extract signing metadata from provisioning profile
          PP_PLIST=$(security cms -D -i $PP_PATH)
          TEAM_ID=$(echo "$PP_PLIST" | plutil -extract TeamIdentifier.0 raw -)
          PP_UUID=$(echo "$PP_PLIST" | plutil -extract UUID raw -)
          PP_NAME=$(echo "$PP_PLIST" | plutil -extract Name raw -)
          BUNDLE_ID=$(echo "$PP_PLIST" | plutil -extract Entitlements.application-identifier raw - | sed "s/^${TEAM_ID}\\.//")
          echo "team_id=$TEAM_ID" >> $GITHUB_OUTPUT
          echo "pp_uuid=$PP_UUID" >> $GITHUB_OUTPUT
          echo "pp_name=$PP_NAME" >> $GITHUB_OUTPUT
          echo "bundle_id=$BUNDLE_ID" >> $GITHUB_OUTPUT
          echo "Signing: Team=$TEAM_ID Profile=$PP_NAME ($PP_UUID) Bundle=$BUNDLE_ID"

      - name: Archive for distribution
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        working-directory: apps/pwa/ios/App
        run: |
          xcodebuild archive \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${{ steps.signing.outputs.team_id }}" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE="${{ steps.signing.outputs.pp_uuid }}"

      - name: Export IPA
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        working-directory: apps/pwa/ios/App
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ steps.signing.outputs.team_id }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ steps.signing.outputs.bundle_id }}</key>
              <string>${{ steps.signing.outputs.pp_name }}</string>
            </dict>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Write API key to ~/private_keys/ (altool default search path)
          mkdir -p ~/private_keys
          echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o ~/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          # Find the exported IPA
          IPA_PATH=$(find $RUNNER_TEMP/export -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No IPA found in export directory"
            ls -la $RUNNER_TEMP/export/ 2>/dev/null || echo "Export directory does not exist"
            exit 1
          fi
          echo "Found IPA: $IPA_PATH"

          xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID"

      - name: Clean up keychain
        if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
